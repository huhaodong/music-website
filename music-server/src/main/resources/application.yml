spring:
  mail:
    host: smtp.163.com # 网站发送邮件邮箱服务 host
    port: 465
    username:   # 开启那个服务的邮箱
    password:  # 开启服务的那个认证码
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
          starttls:
            enable: true
  flyway:
    enabled: false

jwt:
  secret: your-256-bit-secret-key-for-jwt-token-generation-minimum-32-chars
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

mail:
  address:   # 开启那个服务的邮箱

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl